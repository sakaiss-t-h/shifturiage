<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e8e6e0;
    --text: #1a1a1a;
    --muted: #999;
    --muted2: #bbb;
    --sun: #e0352b;
    --sat: #1a6fcf;
    --D-bg: #1a6fcf;
    --D-text: #ffffff;
    --N-bg: #2d2250;
    --N-text: #c4b5fd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--surface);
    padding: 1rem 1.4rem 0.9rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .app-title { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  .legend { display: flex; gap: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .pip { width: 10px; height: 10px; border-radius: 3px; }
  .pip-D { background: var(--D-bg); }
  .pip-N { background: var(--N-bg); }

  /* Month nav */
  .month-nav {
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.4rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .nav-btn {
    width: 42px; height: 42px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:active { background: #ebebeb; }
  .month-label-wrap { text-align: center; }
  .month-label { font-family: 'DM Mono', monospace; font-size: 30px; font-weight: 500; color: var(--text); letter-spacing: -0.03em; display: block; line-height: 1; }
  .year-label { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; margin-top: 3px; display: block; }

  /* Stats */
  .stats-row { display: flex; gap: 10px; padding: 1rem 1.4rem 0; }
  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--border);
    border-radius: 14px;
    padding: 10px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .stat.stat-D { border-top-color: var(--D-bg); }
  .stat.stat-N { border-top-color: var(--N-bg); }
  .stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; font-weight: 500; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--text); }
  .stat-val span { font-size: 10px; margin-left: 1px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; }
  .stat-D .stat-val { color: var(--D-bg); }
  .stat-N .stat-val { color: var(--N-bg); }

  /* Period totals */
  .period-section { padding: 1rem 1.4rem 0; display: flex; flex-direction: column; gap: 8px; }
  .period-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .period-card.active-period { border-color: #1a6fcf; background: #f0f6ff; }
  .period-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .period-range { font-size: 11px; color: var(--muted2); margin-top: 2px; }
  .period-amount {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
  }
  .period-amount.has-value { color: #1a6fcf; }
  .period-unit { font-size: 11px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; }

  /* Calendar */
  .cal-wrap { flex: 1; padding: 1rem 1.4rem 2.5rem; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .dh { font-size: 11px; text-align: center; padding-bottom: 8px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; }
  .dh.sun { color: var(--sun); }
  .dh.sat { color: var(--sat); }
  .dc {
    aspect-ratio: 1;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 400;
    color: var(--muted2);
    gap: 0;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: transform 0.08s;
  }
  .dc:active { transform: scale(0.93); }
  .dc.D { background: var(--D-bg); color: var(--D-text); font-weight: 700; box-shadow: 0 2px 8px rgba(26,111,207,0.22); }
  .dc.N { background: var(--N-bg); color: var(--N-text); font-weight: 700; box-shadow: 0 2px 8px rgba(45,34,80,0.15); }
  .dc.rest { background: #f0eeea; color: #bbb; }
  .dc.sun-text { color: rgba(224,53,43,0.55); }
  .dc.sat-text { color: rgba(26,111,207,0.55); }
  .dc.today { outline: 2.5px solid #1a6fcf; outline-offset: 2px; }
  .dc.N.today { outline-color: #a78bfa; }
  .dc.holiday .day-num { color: var(--sun) !important; opacity: 0.9; }
  .dc.D.holiday .day-num { color: #ffb3b0 !important; }
  .dc.N.holiday .day-num { color: #ffb3b0 !important; }
  .dc.has-sales::after {
    content: '';
    position: absolute;
    bottom: 4px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #22c55e;
  }
  .dc.D.has-sales::after { background: #86efac; }
  .dc.N.has-sales::after { background: #a78bfa; }
  .day-num { font-size: 14px; line-height: 1; }
  .shift-badge { font-family: 'DM Mono', monospace; font-size: 8px; font-weight: 500; opacity: 0.65; line-height: 1; margin-top: 1px; }
  .sales-dot-num {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: #22c55e;
    line-height: 1;
    margin-top: 1px;
  }
  .dc.D .sales-dot-num { color: #86efac; }
  .dc.N .sales-dot-num { color: #a78bfa; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 1.5rem 1.5rem 2.5rem;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 1.2rem; }
  .modal-date { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .modal-shift {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 500;
    padding: 4px 12px; border-radius: 20px;
    margin-bottom: 1.2rem;
  }
  .modal-shift.D { background: var(--D-bg); color: #fff; }
  .modal-shift.N { background: var(--N-bg); color: var(--N-text); }
  .modal-shift.rest { background: #f0eeea; color: var(--muted); }
  .modal-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  .modal-input-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 1.4rem; }
  .yen-sign { font-size: 22px; color: var(--muted); font-weight: 500; }
  .modal-input {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    border: none;
    border-bottom: 2px solid var(--border);
    outline: none;
    padding: 4px 0;
    color: var(--text);
    background: transparent;
  }
  .modal-input:focus { border-bottom-color: #1a6fcf; }
  .modal-btns { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-cancel { background: var(--bg); color: var(--muted); }
  .btn-save { background: #1a6fcf; color: #fff; }
  .btn-delete { background: #fff0f0; color: #e0352b; border: 1px solid #fdd; font-size: 13px; flex: 0.6; }
</style>
</head>
<body>

<div class="header">
  <span class="app-title">シフト カレンダー</span>
  <div class="legend">
    <div class="legend-item"><div class="pip pip-D"></div>出勤</div>
  </div>
</div>

<div class="month-nav">
  <button class="nav-btn" id="prevBtn">‹</button>
  <div class="month-label-wrap">
    <span class="month-label" id="monthLabel"></span>
    <span class="year-label" id="yearLabel"></span>
  </div>
  <button class="nav-btn" id="nextBtn">›</button>
</div>

<div class="stats-row" id="statsRow"></div>
<div id="periodLabel" style="text-align:center;font-size:11px;color:var(--muted2);padding:6px 0 2px;letter-spacing:0.03em;"></div>
<div class="period-section" id="periodSection"></div>
<div class="cal-wrap">
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- 入力モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-shift" id="modalShift"></div>
    <div class="modal-label">売上金額</div>
    <div class="modal-input-wrap">
      <span class="yen-sign">¥</span>
      <input class="modal-input" id="modalInput" type="number" inputmode="numeric" placeholder="0">
    </div>
    <div class="modal-btns">
      <button class="btn btn-delete" id="btnDelete">削除</button>
      <button class="btn btn-cancel" id="btnCancel">キャンセル</button>
      <button class="btn btn-save" id="btnSave">保存</button>
    </div>
  </div>
</div>

<script>
// 日本の祝日 (YYYY-MM-DD)
const HOLIDAYS = new Set([
  // 2025
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20',
  '2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06',
  '2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23',
  '2025-10-13','2025-11-03','2025-11-23','2025-11-24',
  // 2026
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20',
  '2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23',
  // 2027
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23','2027-03-20',
  '2027-04-29','2027-05-03','2027-05-04','2027-05-05',
  '2027-07-19','2027-08-11','2027-09-20','2027-09-23',
  '2027-10-11','2027-11-03','2027-11-23',
  // 2028
  '2028-01-01','2028-01-10','2028-02-11','2028-02-23','2028-03-20',
  '2028-04-29','2028-05-03','2028-05-04','2028-05-05',
  '2028-07-17','2028-08-11','2028-09-18','2028-09-22',
  '2028-10-09','2028-11-03','2028-11-23',
]);

let salesVisible = true;

const PATTERN = 'DxDxxxDxDxDxxDxDxDxDxDxx';
const PATTERN_START = new Date(2026, 3, 6);
const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const WEEKDAY = ['日','月','火','水','木','金','土'];

const today = new Date();
let curYear = today.getFullYear();
let curMonth = today.getMonth();
let salesData = {};
let modalKey = null;

try { salesData = JSON.parse(localStorage.getItem('shiftSales') || '{}'); } catch(e) {}

function saveStorage() {
  try { localStorage.setItem('shiftSales', JSON.stringify(salesData)); } catch(e) {}
}

function getShift(date) {
  const diff = Math.floor((date - PATTERN_START) / 86400000);
  const idx = ((diff % PATTERN.length) + PATTERN.length) % PATTERN.length;
  return PATTERN[idx];
}

function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function fmt(n) { return n.toLocaleString('ja-JP'); }

function toggleSales() {
  salesVisible = !salesVisible;
  render();
}

function render() {
  document.getElementById('monthLabel').textContent = MONTH_NAMES[curMonth];
  document.getElementById('yearLabel').textContent = curYear + '年';

  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  // 締め期間（当月16日〜翌月15日）の出勤・休暇カウント
  let cD=0, cN=0, cX=0;
  // 当月16日〜末日
  for (let d=16; d<=daysInMonth; d++) {
    const s = getShift(new Date(curYear, curMonth, d));
    if(s==='D') cD++; else if(s==='N') cN++; else cX++;
  }
  // 翌月1日〜15日
  let nextYc = curYear, nextMc = curMonth + 1;
  if(nextMc > 11) { nextMc = 0; nextYc++; }
  const nextDaysC = new Date(nextYc, nextMc + 1, 0).getDate();
  for (let d=1; d<=15 && d<=nextDaysC; d++) {
    const s = getShift(new Date(nextYc, nextMc, d));
    if(s==='D') cD++; else if(s==='N') cN++; else cX++;
  }
  const nextLabelC = `${nextYc}年${MONTH_NAMES[nextMc]}`;
  const periodRangeLabel = `${curYear}年${MONTH_NAMES[curMonth]}16日 〜 ${nextLabelC}15日`;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat stat-D"><span class="stat-lbl">出勤</span><span class="stat-val D">${cD}<span>日</span></span></div>
    <div class="stat stat-x"><span class="stat-lbl">休暇</span><span class="stat-val">${cX}<span>日</span></span></div>
  `;
  document.getElementById('periodLabel').textContent = periodRangeLabel;

  // 締め期間の集計
  // 期間A: 当月1日〜15日
  // 期間B: 当月16日〜翌月15日
  let sumA = 0, sumB = 0;
  for (let d=1; d<=15 && d<=daysInMonth; d++) {
    const v = salesData[dateKey(curYear, curMonth, d)];
    if(v) sumA += v;
  }
  // B: 当月16日〜末日
  for (let d=16; d<=daysInMonth; d++) {
    const v = salesData[dateKey(curYear, curMonth, d)];
    if(v) sumB += v;
  }
  // B: 翌月1日〜15日
  let nextY = curYear, nextM = curMonth + 1;
  if(nextM > 11) { nextM = 0; nextY++; }
  const nextDays = new Date(nextY, nextM + 1, 0).getDate();
  for (let d=1; d<=15 && d<=nextDays; d++) {
    const v = salesData[dateKey(nextY, nextM, d)];
    if(v) sumB += v;
  }

  const todayInA = today.getFullYear()===curYear && today.getMonth()===curMonth && today.getDate()<=15;
  const todayInB = (today.getFullYear()===curYear && today.getMonth()===curMonth && today.getDate()>=16)
                 || (today.getFullYear()===nextY && today.getMonth()===nextM && today.getDate()<=15);

  const nextLabel = `${nextY}年${MONTH_NAMES[nextM]}`;
  document.getElementById('periodSection').innerHTML = `
    <div class="period-card${todayInB?' active-period':''}" id="periodToggle" onclick="toggleSales()" style="cursor:pointer;">
      <div>
        <div class="period-label">締め期間 <span style="font-size:10px;color:var(--muted2)">${salesVisible?'（タップで非表示）':'（タップで表示）'}</span></div>
        <div class="period-range">${curYear}年${MONTH_NAMES[curMonth]} 16日 〜 ${nextLabel} 15日</div>
      </div>
      <div>
        <span class="period-amount${sumB>0?' has-value':''}">${salesVisible ? '¥'+fmt(sumB) : '¥ ――'}</span>
      </div>
    </div>
  `;

  // カレンダー
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['日','月','火','水','木','金','土'].forEach((h,i) => {
    const dh = document.createElement('div');
    dh.className = 'dh' + (i===0?' sun':i===6?' sat':'');
    dh.textContent = h;
    grid.appendChild(dh);
  });
  for (let e=0; e<firstDay; e++) grid.appendChild(document.createElement('div'));

  for (let d=1; d<=daysInMonth; d++) {
    const date = new Date(curYear, curMonth, d);
    const dow = date.getDay();
    const shift = getShift(date);
    const key = dateKey(curYear, curMonth, d);
    const sales = salesData[key];

    const cell = document.createElement('div');
    const isHoliday = HOLIDAYS.has(dateKey(curYear, curMonth, d));
    let cls = 'dc';
    if(shift==='D') cls += ' D';
    else if(shift==='N') cls += ' N';
    else {
      cls += ' rest';
      if(dow===0 || isHoliday) cls += ' sun-text';
      else if(dow===6) cls += ' sat-text';
    }
    if(isHoliday && (shift==='D' || shift==='N')) cls += ' holiday';
    if(today.getFullYear()===curYear && today.getMonth()===curMonth && today.getDate()===d) cls += ' today';
    if(sales) cls += ' has-sales';
    cell.className = cls;

    const num = document.createElement('span');
    num.className = 'day-num';
    num.textContent = d;
    cell.appendChild(num);

    if(shift==='D' || shift==='N') {
      const badge = document.createElement('span');
      badge.className = 'shift-badge';
      badge.textContent = shift==='D' ? '出勤' : '夜勤';
      cell.appendChild(badge);
    }

    if(sales && salesVisible) {
      const s = document.createElement('span');
      s.className = 'sales-dot-num';
      s.textContent = sales >= 10000 ? `${Math.round(sales/1000)}k` : `${sales}`;
      cell.appendChild(s);
    }

    cell.addEventListener('click', () => openModal(curYear, curMonth, d, shift, date));
    grid.appendChild(cell);
  }
}

function openModal(y, m, d, shift, date) {
  modalKey = dateKey(y, m, d);
  const dow = date.getDay();
  document.getElementById('modalDate').textContent = `${y}年 ${MONTH_NAMES[m]} ${d}日（${WEEKDAY[dow]}）`;
  const shiftEl = document.getElementById('modalShift');
  if(shift==='D') { shiftEl.textContent = '出勤'; shiftEl.className = 'modal-shift D'; }
  else if(shift==='N') { shiftEl.textContent = '夜勤'; shiftEl.className = 'modal-shift N'; }
  else { shiftEl.textContent = '休暇'; shiftEl.className = 'modal-shift rest'; }
  const existing = salesData[modalKey];
  document.getElementById('modalInput').value = existing || '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('modalInput').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalKey = null;
}

document.getElementById('btnSave').addEventListener('click', () => {
  const val = parseInt(document.getElementById('modalInput').value, 10);
  if(!isNaN(val) && val > 0) { salesData[modalKey] = val; }
  else { delete salesData[modalKey]; }
  saveStorage();
  closeModal();
  render();
});

document.getElementById('btnDelete').addEventListener('click', () => {
  delete salesData[modalKey];
  saveStorage();
  closeModal();
  render();
});

document.getElementById('btnCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

function changeMonth(delta) {
  curMonth += delta;
  if(curMonth > 11) { curMonth = 0; curYear++; }
  if(curMonth < 0)  { curMonth = 11; curYear--; }
  render();
}
document.getElementById('prevBtn').addEventListener('click', () => changeMonth(-1));
document.getElementById('nextBtn').addEventListener('click', () => changeMonth(1));

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  if(document.getElementById('modalOverlay').classList.contains('open')) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 60) changeMonth(dx < 0 ? 1 : -1);
}, {passive:true});

render();
</script>
</body>
</html>
